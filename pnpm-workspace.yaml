packages:
  - 'examples/*'

# zero-sqlite3 must build because the playground runs zero-cache. The other
# native helpers are optional for the repository's build and runtime paths.
allowBuilds:
  '@parcel/watcher': false
  '@rocicorp/zero-sqlite3': true
  esbuild: false
  lmdb: false
  msgpackr-extract: false
  protobufjs: false
