name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # A tag is a claim about package.json — refuse to publish a mismatch.
      - run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: pnpm build
      # Pack exactly once and validate that tarball; publishing a tarball runs
      # no pack/prepare lifecycle, so the checked bytes are the shipped bytes.
      - run: npm pack
      - run: pnpm exec publint run ngx-zero-*.tgz
      - run: pnpm exec attw ngx-zero-*.tgz --profile esm-only
      # Trusted Publishing (OIDC) — no token; npm authenticates via the
      # workflow identity. Needs npm 11.5+, node 22 bundles 10.x.
      - run: npm install -g npm@latest
      - run: npm publish ngx-zero-*.tgz
