name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # A tag is a claim about package.json — refuse to publish a mismatch.
      - run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: pnpm build
      # Pack exactly once and validate that tarball; publishing a tarball runs
      # no pack/prepare lifecycle, so the checked bytes are the shipped bytes.
      - run: npm pack
      - run: pnpm exec publint run ngx-zero-*.tgz
      - run: pnpm exec attw ngx-zero-*.tgz --profile esm-only
      # npm (not pnpm) for provenance support. NPM_TOKEN bootstraps the first
      # publish; once the package exists, configure Trusted Publishing on
      # npmjs.com for this repo+workflow, delete the secret, drop the env
      # block below, and add `npm install -g npm@latest` (OIDC needs npm 11.5+,
      # node 22 bundles 10.x).
      - run: npm publish ngx-zero-*.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
