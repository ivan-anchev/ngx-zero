name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  # Stable aggregate context for branch protection: require "verify" only,
  # regardless of how the matrix evolves. Kept here (not in test.yml) so the
  # check is named exactly "verify", not "<caller job> / verify".
  verify:
    name: verify
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.test.result }}" = "success"
