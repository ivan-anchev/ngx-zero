<header class="hero">
  <div class="hero-copy">
    <p class="product-name"><strong>ngx-zero</strong><span>Playground</span></p>
    <h1>Issues</h1>
    <p class="lede">
      Optimistic mutations against a real Zero backend. Add “rollback” to a title
      to see the server reject it.
    </p>
  </div>
  <aside class="runtime" aria-label="Runtime status">
    <dl>
      <div>
        <dt>User</dt>
        <dd class="status">
          <i aria-hidden="true"></i>
          {{ userID() }}
        </dd>
      </div>
      <div>
        <dt>Client starts</dt>
        <dd>{{ instanceCreations() }}</dd>
      </div>
      <div>
        <dt>Query</dt>
        <dd>{{ queryState() }}</dd>
      </div>
    </dl>
  </aside>
</header>
