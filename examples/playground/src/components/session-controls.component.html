<section class="session-tools" aria-labelledby="session-tools-heading">
  <div class="session-heading">
    <h2 id="session-tools-heading">Session tools</h2>
    <p aria-live="polite">
      {{ authAction() ?? status() }}
    </p>
  </div>
  <div class="actions">
    <button
      type="button"
      [disabled]="authAction() !== undefined"
      (click)="switchUser()"
    >
      Switch to {{ otherUser() }}
    </button>
    <button
      type="button"
      [disabled]="authAction() !== undefined"
      (click)="rotateAuth()"
    >
      Rotate auth
    </button>
    <button
      type="button"
      [disabled]="authAction() !== undefined"
      (click)="rotateAuth(15)"
    >
      Use 15s token
    </button>
  </div>
</section>
