name: ngx-zero-playground

services:
  postgres:
    image: postgres:16-alpine
    shm_size: 1g
    ports:
      - '5430:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: playground
    command: >-
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=5
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d playground']
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
